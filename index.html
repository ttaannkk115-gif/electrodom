<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOLT MASTER - КЛИЕНТ</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root {
            --main-gold: #ffc107;
            --dark-bg: #0a0a0a;
            --card-bg: rgba(30, 30, 30, 0.6);
            --text-main: #f0f0f0;
            --text-dim: #888888;
            --success: #4caf50;
            --process: #2196f3;
            --danger: #ff4444;
            --accent-border: rgba(255, 193, 7, 0.15);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; 
            background: var(--dark-bg);
            background-image: radial-gradient(circle at 50% -20%, #222 0%, #0a0a0a 100%);
            color: var(--text-main); 
            padding-bottom: 120px; 
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        header { padding: 20px 20px 10px; text-align: center; }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin: 0; }
        .logo span { color: var(--main-gold); }
        
        .user-id-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255, 193, 7, 0.05); padding: 5px 15px;
            border-radius: 20px; font-size: 11px; margin-top: 8px;
            border: 1px solid var(--accent-border); color: var(--main-gold);
            font-weight: bold;
        }

        /* --- СТИЛИ БАННЕРА --- */
        .banner-container {
            margin: 10px 15px 20px;
            background: linear-gradient(145deg, #151515, #050505);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid var(--accent-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .banner-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .banner-info {
            padding: 15px;
            text-align: center;
            background: rgba(255, 193, 7, 0.03);
        }

        .address-line { font-size: 13px; font-weight: bold; color: var(--text-main); margin-bottom: 4px; }
        .schedule-line { font-size: 11px; color: var(--main-gold); letter-spacing: 0.5px; text-transform: uppercase; }
        
        .promo-text {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
            color: #ccc;
            line-height: 1.4;
        }

        .guarantee { color: var(--main-gold); font-weight: 800; font-size: 11px; margin-top: 4px; letter-spacing: 1px; }

        /* --- КАРТОЧКИ И ФОРМЫ --- */
        .card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 18px; 
            padding: 18px; 
            margin: 0 15px 12px; 
            backdrop-filter: blur(10px);
        }
        
        .card-header { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 8px; }
        .tag-city { color: var(--main-gold); font-weight: bold; }
        
        .badge-status { font-size: 9px; padding: 4px 8px; border-radius: 6px; font-weight: bold; display: inline-block; margin-bottom: 10px; text-transform: uppercase; }
        .bg-free { background: rgba(255,255,255,0.1); color: #fff; }
        .bg-busy { background: rgba(33, 150, 243, 0.2); color: var(--process); }

        .btn { border: none; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 13px; margin-top: 5px; transition: 0.3s; }
        .btn-main { background: var(--main-gold); color: #000; box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3); }
        .btn-cancel { background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); flex: 1; }
        .btn-report { background: rgba(255, 255, 255, 0.05); color: #888; border: 1px solid #333; font-size: 11px; padding: 8px; flex: 1; }

        nav { position: fixed; bottom: 0; width: 100%; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; padding: 15px 0 25px; z-index: 1000; }
        nav button { background: none; border: none; color: #555; font-size: 10px; font-weight: bold; display: flex; flex-direction: column; align-items: center; flex: 1; gap: 5px; outline: none; }
        nav button.active { color: var(--main-gold); }

        .hidden { display: none; }
        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px; color: #fff; width: 100%; margin-bottom: 10px; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--main-gold); background: rgba(255,255,255,0.08); }
    </style>
</head>
<body>

<header>
    <div class="logo">VOLT<span>MASTER</span></div>
    <div class="user-id-badge"><span id="display-id">ID: ----</span></div>
</header>

<div class="banner-container">
    <img src="electrodom.jpeg" alt="Electrodom" class="banner-img">
    <div class="banner-info">
        <div class="address-line">📍 г. Махачкала, пр-кт Имама Шамиля 44</div>
        <div class="schedule-line">с 9:00 до 19:00 — Без выходных</div>
        <div class="promo-text">
            Если вам нужен качественный материал, то обращайтесь к нам.
            <div class="guarantee">С ГАРАНТИЕЙ КАЧЕСТВА</div>
        </div>
    </div>
</div>

<div id="view-add" style="padding: 0 20px 20px;">
    <select id="city-input">
        <option value="Махачкала">Махачкала</option>
        <option value="Каспийск">Каспийск</option>
        <option value="Буйнакск">Буйнакск</option>
    </select>
    <input type="text" id="task" placeholder="Что нужно сделать?">
    <input type="text" id="address" placeholder="Адрес (улица, дом)">
    <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">
    <button class="btn btn-main" onclick="saveOrder()">ОПУБЛИКОВАТЬ ЗАЯВКУ</button>
</div>

<div id="view-list" class="hidden"><div id="my-orders-list"></div></div>
<div id="view-archive" class="hidden"><div id="archive-list"></div></div>

<nav>
    <button onclick="changeView('add', this)" class="active"><i>➕</i>СОЗДАТЬ</button>
    <button onclick="changeView('list', this)"><i>📋</i>МОИ ЗАКАЗЫ</button>
    <button onclick="changeView('archive', this)"><i>📁</i>АРХИВ</button>
</nav>

<script>
    // --- КОНФИГУРАЦИЯ FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyD-dIC8bm8y4kaY7RXmMrys2wOMLA5o8vY",
        authDomain: "voltmaster-332c0.firebaseapp.com",
        databaseURL: "https://voltmaster-332c0-default-rtdb.firebaseio.com",
        projectId: "voltmaster-332c0",
        storageBucket: "voltmaster-332c0.firebasestorage.app",
        messagingSenderId: "312337098429",
        appId: "1:312337098429:web:663e0f6787bd62d19bf9d4"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- ЛОГИКА ID И АВТОСОХРАНЕНИЯ ---
    let userID = localStorage.getItem('volt_client_uid') || Math.floor(1000 + Math.random() * 9000).toString();
    localStorage.setItem('volt_client_uid', userID);
    document.getElementById('display-id').innerText = "ID: " + userID;

    const formFields = ['task', 'address', 'phone', 'city-input'];

    function saveDraft() {
        const draft = {};
        formFields.forEach(id => { draft[id] = document.getElementById(id).value; });
        localStorage.setItem('volt_draft_order', JSON.stringify(draft));
    }

    function loadDraft() {
        const saved = localStorage.getItem('volt_draft_order');
        if (saved) {
            const draft = JSON.parse(saved);
            formFields.forEach(id => { if (draft[id]) document.getElementById(id).value = draft[id]; });
        }
    }

    // Слушатели для полей
    formFields.forEach(id => {
        document.getElementById(id).addEventListener('input', saveDraft);
    });

    // Маска телефона
    document.getElementById('phone').addEventListener('input', (e) => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/);
        if (!x[2]) e.target.value = x[1] ? '+7 (' : '';
        else e.target.value = '+7 (' + x[2] + (x[3] ? ') ' + x[3] : '') + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
        saveDraft();
    });

    function initSync() {
        loadDraft();
        db.ref('shabashki/active').on('value', snap => {
            const all = Object.values(snap.val() || {});
            renderList(all.filter(o => o.ownerID == userID), 'my-orders-list', true);
        });
        db.ref('shabashki/archive').on('value', snap => {
            const all = Object.values(snap.val() || {});
            renderList(all.filter(o => o.ownerID == userID), 'archive-list', false);
        });
    }

    function renderList(orders, containerId, isActive) {
        const container = document.getElementById(containerId);
        container.innerHTML = orders.length ? '' : '<div style="text-align:center;padding:50px;color:#444">У вас пока нет заказов</div>';
        
        orders.sort((a,b) => b.timestamp - a.timestamp).forEach(o => {
            const isBusy = o.status === 'busy';
            let rejectionsHtml = o.rejections ? `<div style="background:rgba(255,0,0,0.05);padding:10px;border-radius:10px;margin-bottom:10px;font-size:11px;color:#ff8888;border:1px dashed #533">${Object.values(o.rejections).map(r => `• ${r.text}`).join('<br>')}</div>` : '';

            const card = document.createElement('div');
            card.className = 'card';
            if(!isActive) card.style.opacity = '0.6';

            card.innerHTML = `
                <div class="card-header"><span class="tag-city">${o.city}</span><span>${isActive ? o.date : (o.closedAt || 'Завершен')}</span></div>
                <span class="badge-status ${isBusy ? 'bg-busy' : 'bg-free'}">${!isActive ? '✅ ГОТОВО' : (isBusy ? '⏳ МАСТЕР В ПУТИ' : '🔘 ПОИСК МАСТЕРА')}</span>
                <h3 style="margin:5px 0; font-size: 16px;">${o.task}</h3>
                <div style="font-size:12px;color:#888;margin-bottom:10px;">📍 ${o.addr}</div>
                ${rejectionsHtml}
                <div style="display:flex; gap:8px;">
                    ${isActive && !isBusy ? `<button class="btn btn-cancel" onclick="cancelOrder('${o.id}')">ОТМЕНА</button>` : ''}
                    <button class="btn btn-report" onclick="sendComplaint('${o.id}', '${o.task}', '${o.workerID || '---'}')">ЖАЛОБА</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function cancelOrder(id) {
        if(confirm("Вы уверены, что хотите удалить заявку?")) db.ref(`shabashki/active/${id}`).remove();
    }

    function sendComplaint(id, task, worker) {
        const message = `⚠️ ЖАЛОБА ОТ КЛИЕНТА (ID: ${userID})\nЗаказ: ${task}\nID Мастера: ${worker}`;
        window.open(`https://wa.me/79640040355?text=${encodeURIComponent(message)}`, '_blank');
    }

    function saveOrder() {
        const task = document.getElementById('task').value;
        const addr = document.getElementById('address').value;
        const phone = document.getElementById('phone').value;
        const city = document.getElementById('city-input').value;

        if(!task || !addr || phone.length < 18) return alert("Пожалуйста, заполните все поля!");

        const id = Date.now().toString();
        const data = {
            id, task, addr, phone, city, ownerID: userID, status: 'free',
            date: new Date().toLocaleString('ru-RU', {hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit'}),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };

        db.ref('shabashki/active/' + id).set(data).then(() => {
            db.ref('push_queue').push({ 
                title: "НОВАЯ ЗАЯВКА! 🔥", 
                body: city + ": " + task,
                timestamp: firebase.database.ServerValue.TIMESTAMP 
            });
            alert("Ваша заявка опубликована!");
            localStorage.removeItem('volt_draft_order'); // Очищаем черновик после успеха
            resetForm();
            changeView('list', document.querySelectorAll('nav button')[1]);
        });
    }

    function changeView(view, btn) {
        ['view-add', 'view-list', 'view-archive'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById('view-' + view).classList.remove('hidden');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
    }

    function resetForm() {
        document.getElementById('task').value = '';
        document.getElementById('address').value = '';
        document.getElementById('phone').value = '';
    }

    window.onload = initSync;
</script>
</body>
</html>
