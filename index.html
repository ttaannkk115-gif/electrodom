<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoltMaster - Подать заявку</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root {
            --main-gold: #ffc107;
            --page-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-dim: #777777;
            --border-color: #f0f0f0;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: var(--page-bg);
            color: var(--text-main);
            padding-bottom: 110px;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* БАННЕР БЕЗ ОТСТУПОВ СВЕРХУ */
        .banner-wrapper {
            position: relative;
            width: 100%;
            line-height: 0;
            background: #fff;
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .banner-wrapper::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            height: 60px;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, #ffffff 100%);
        }

        .banner-content {
            padding: 5px 20px 15px;
            text-align: center;
        }

        .address-line { font-size: 16px; font-weight: 700; color: #000; margin-bottom: 4px; }
        .schedule-line { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.8px; }

        /* НОВЫЙ ЗАГОЛОВОК ЗАЯВКИ */
        .order-headline {
            text-align: center;
            padding: 10px 20px 25px;
        }

        .order-headline h1 {
            font-size: 20px;
            font-weight: 800;
            margin: 0 0 5px 0;
            color: #000;
            letter-spacing: -0.5px;
        }

        .client-id-soft {
            font-size: 10px;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .promo-box {
            margin: 0 20px 25px;
            padding: 15px;
            border-left: 4px solid var(--main-gold);
            background: #fafafa;
            font-size: 14px;
            color: #444;
            line-height: 1.5;
        }

        .guarantee-label { display: block; margin-top: 5px; font-weight: 800; font-size: 11px; color: #000; }

        .container { padding: 0 20px; }

        input, select { 
            background: #fff; border: 1px solid #ddd; border-radius: 14px; 
            padding: 16px; color: #000; width: 100%; margin-bottom: 12px; 
            font-size: 16px; box-sizing: border-box; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--main-gold); box-shadow: 0 0 0 4px rgba(255, 193, 7, 0.1); }

        .btn-main { 
            background: var(--main-gold); color: #000; border: none; padding: 18px; 
            border-radius: 16px; font-weight: 800; width: 100%; cursor: pointer; 
            font-size: 15px; box-shadow: 0 5px 15px rgba(255, 193, 7, 0.4); 
            text-transform: uppercase; letter-spacing: 1px;
        }

        .card { 
            background: #fff; border: 1px solid #eee; border-radius: 20px; 
            padding: 20px; margin-bottom: 15px; box-shadow: 0 3px 12px rgba(0,0,0,0.03);
        }

        nav { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #eee; display: flex; padding: 12px 0 30px; z-index: 1000; }
        nav button { background: none; border: none; color: #bbb; font-size: 10px; font-weight: bold; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        nav button.active { color: #000; }
        nav i { font-style: normal; font-size: 20px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="banner-wrapper">
    <img src="electrodom.jpeg" alt="Electrodom" class="banner-img">
</div>

<div class="banner-content">
    <div class="address-line">📍 пр-кт Имама Шамиля 44</div>
    <div class="schedule-line">9:00 - 19:00 • Без выходных</div>
</div>

<div class="order-headline">
    <h1>Подать заявку на электрика</h1>
    <div class="client-id-soft" id="display-id">ID: ----</div>
</div>

<div class="promo-box">
    Если вам нужен качественный материал, то обращайтесь к нам.
    <span class="guarantee-label">С ГАРАНТИЕЙ КАЧЕСТВА</span>
</div>

<div id="view-add" class="container">
    <select id="city-input">
        <option value="Махачкала">Махачкала</option>
        <option value="Каспийск">Каспийск</option>
        <option value="Буйнакск">Буйнакск</option>
    </select>
    <input type="text" id="task" placeholder="Какая работа требуется?">
    <input type="text" id="address" placeholder="Ваш адрес (улица, дом)">
    <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">
    <button class="btn-main" onclick="saveOrder()">Отправить заявку</button>
</div>

<div id="view-list" class="hidden container"><div id="my-orders-list"></div></div>
<div id="view-archive" class="hidden container"><div id="archive-list"></div></div>

<nav>
    <button onclick="changeView('add', this)" class="active"><i>➕</i>ВЫЗОВ</button>
    <button onclick="changeView('list', this)"><i>📋</i>ЗАКАЗЫ</button>
    <button onclick="changeView('archive', this)"><i>📁</i>АРХИВ</button>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD-dIC8bm8y4kaY7RXmMrys2wOMLA5o8vY",
        authDomain: "voltmaster-332c0.firebaseapp.com",
        databaseURL: "https://voltmaster-332c0-default-rtdb.firebaseio.com",
        projectId: "voltmaster-332c0",
        storageBucket: "voltmaster-332c0.firebasestorage.app",
        messagingSenderId: "312337098429",
        appId: "1:312337098429:web:663e0f6787bd62d19bf9d4"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userID = localStorage.getItem('volt_client_uid') || Math.floor(1000 + Math.random() * 9000).toString();
    localStorage.setItem('volt_client_uid', userID);
    document.getElementById('display-id').innerText = "Ваш клиентский номер: " + userID;

    // Автосохранение
    const fields = ['task', 'address', 'phone', 'city-input'];
    function saveDraft() {
        const data = {};
        fields.forEach(id => data[id] = document.getElementById(id).value);
        localStorage.setItem('volt_draft_master', JSON.stringify(data));
    }

    function loadDraft() {
        const saved = localStorage.getItem('volt_draft_master');
        if(saved) {
            const data = JSON.parse(saved);
            fields.forEach(id => { if(data[id]) document.getElementById(id).value = data[id]; });
        }
    }

    fields.forEach(id => document.getElementById(id).addEventListener('input', saveDraft));

    document.getElementById('phone').addEventListener('input', (e) => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/);
        if (!x[2]) e.target.value = x[1] ? '+7 (' : '';
        else e.target.value = '+7 (' + x[2] + (x[3] ? ') ' + x[3] : '') + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
        saveDraft();
    });

    function initSync() {
        loadDraft();
        db.ref('shabashki/active').on('value', snap => {
            const all = Object.values(snap.val() || {});
            renderList(all.filter(o => o.ownerID == userID), 'my-orders-list', true);
        });
        db.ref('shabashki/archive').on('value', snap => {
            const all = Object.values(snap.val() || {});
            renderList(all.filter(o => o.ownerID == userID), 'archive-list', false);
        });
    }

    function renderList(orders, containerId, isActive) {
        const container = document.getElementById(containerId);
        container.innerHTML = orders.length ? '' : '<div style="text-align:center;padding:40px;color:#ccc;">Активных заявок нет</div>';
        
        orders.sort((a,b) => b.timestamp - a.timestamp).forEach(o => {
            const isBusy = o.status === 'busy';
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="font-size:10px; color:#999; margin-bottom:5px;">${o.date} • ${o.city}</div>
                <div style="font-weight:bold; font-size:17px; margin-bottom:5px;">${o.task}</div>
                <div style="font-size:13px; color:#777; margin-bottom:12px;">📍 ${o.addr}</div>
                <div style="color:${isBusy ? '#007bff' : '#666'}; font-size:11px; font-weight:bold; text-transform:uppercase;">
                    ${isActive ? (isBusy ? '⏳ Мастер в пути' : '🔘 Поиск мастера...') : '✅ Выполнено'}
                </div>
            `;
            container.appendChild(card);
        });
    }

    function saveOrder() {
        const task = document.getElementById('task').value;
        const addr = document.getElementById('address').value;
        const phone = document.getElementById('phone').value;
        const city = document.getElementById('city-input').value;

        if(!task || !addr || phone.length < 18) return alert("Заполните все данные для связи!");

        const id = Date.now().toString();
        const data = {
            id, task, addr, phone, city, ownerID: userID, status: 'free',
            date: new Date().toLocaleString('ru-RU', {hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit'}),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };

        db.ref('shabashki/active/' + id).set(data).then(() => {
            db.ref('push_queue').push({ title: "НОВАЯ ЗАЯВКА", body: city + ": " + task });
            alert("Ваша заявка принята! Ожидайте звонка мастера.");
            localStorage.removeItem('volt_draft_master');
            resetForm();
            changeView('list', document.querySelectorAll('nav button')[1]);
        });
    }

    function changeView(view, btn) {
        ['view-add', 'view-list', 'view-archive'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById('view-' + view).classList.remove('hidden');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        window.scrollTo(0,0);
    }

    function resetForm() {
        fields.forEach(id => document.getElementById(id).value = '');
    }

    window.onload = initSync;
</script>
</body>
</html>
